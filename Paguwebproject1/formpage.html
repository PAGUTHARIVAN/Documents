<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="formpage.css">
</head>
<body>
    <header>
        <h1 class="title">Login Page</h1>
        <p class="welcome-quote">Welcome to the login page!</p>
    </header>

    <main class="container">
        <form>
            <h2>Hello! Please tell us a little bit about yourself.</h2>
            <fieldset>
                <legend>Personal Information</legend>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Eg.,Pagutharivan" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter Your Email" required>

                <label for="phone">Phone</label>
                <input type="text" id="number" name="number" placeholder="+91" required>
                

                <label for="gender">Gender: </label>
                <label for="male" class="gender">Male</label>
                <input type="radio" id="male" name="male" value="gender">

                <label for="female" class="gender">Female</label>
                <input type="radio" id="female" name="female" value="gender">
            </fieldset>

            <fieldset>
                <legend>Additional Information</legend>
                <label for="father">Father's Name</label>
                <input type="text" id="father" name="father" placeholder="Enter Your Father Name" required>

                <label for="mother">Mother's Name</label>
                <input type="text" id="mother" name="mother" placeholder="Enter Your Mother Name" required>

                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="32 block street" required>
            </fieldset>

            <button type="submit">Submit</button>
            <button type="reset">Clear</button>
        </form>
    </main>
</body>
</html>
