<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="formpage.css">
    <title>Document</title>
</head>
<body>
    <!--Hover pseudo class-->
    <button class="btn-click">Click Me</button>

    <ul>
        <li>One</li>
        <li>Two</li>
        <li>Three</li>
        <li>Four</li>
        <li>Five</li>
    </ul>

    <table style="border-collapse: collapse;">
        <thead>
            <th scope="col">Languages</th>
            <th scope="col">Performance</th>
            <th scope="col">Availablity</th>
            <th scope="col">Price</th>
        </thead>

        <tr>
            <th scope="row">Python</th>
            <td>High-level</td>
            <td>All</td>
            <td>None</td>
        </tr>

        <tr>
            <th scope="row">Java</th>
            <td>High-level</td>
            <td>All</td>
            <td>High</td>
        </tr>

        <tr>
            <th scope="row">Rust</th>
            <td>Low-level</td>
            <td>All</td>
            <td>None</td>
        </tr>

        <tr>
            <th scope="row">C</th>
            <td>Low-level</td>
            <td>All</td>
            <td>None</td> 
        </tr>
    </table>
    <form>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
    </form>

    <form class="custom">
        <input  class="cust" type="radio" id="yes" name="choose" value="yes">
        <label for="yes">YES</label>
        <input class="cust" type="radio" id="no" name="choose" value="no">
        <label for="no">NO</label>
    </form>
</body>
</html>
